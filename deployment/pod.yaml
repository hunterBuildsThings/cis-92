apiVersion: v1
kind: Pod
metadata:
  name: django
  labels:
    function: app
    version: v1
spec:
  containers:
  - name: django
    image: ghcr.io/hunterbuildsthings/cis-92:latest
    ports:
    - containerPort: 8080
    resources:
      requests:
        cpu: 1000m 
        memory: 1024Mi
        ephemeral-storage: 10Mi
      limits:
        cpu: 1000m 
        memory: 1024Mi
        ephemeral-storage: 10Mi
    envFrom:
    - configMapRef:
        name: mysite-config
    - secretRef:
        name: mysite-secrets
    volumeMounts:
      - name: db
        mountPath: /data
  securityContext:
      fsGroup: 1000
  volumes:
    - name: db
      persistentVolumeClaim:
        claimName: mysite-data
