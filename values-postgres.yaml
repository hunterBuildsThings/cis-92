# Configuration for Postgres
auth:
  username: mysiteuser
  password: this-is-a-bad-password
  database: mysite
# GKE Autopilot requires requests and limits.
primary:
  resources:
    requests:
      memory: "1024Mi"
      cpu: "1000m"
      ephemeral-storage: "100Mi"
    limits:
      memory: "1024Mi"
      cpu: "1000m"
      ephemeral-storage: "100Mi"